version: "3.9"

services:
  backend-laravel:
    image: php:8.3-cli
    working_dir: /app
    environment:
      PULSE_ENGINE_URL: http://pulse-engine:8001
    volumes:
      - ./backend-laravel:/app
    ports:
      - "8000:8000"
    command: ["sh", "-c", "php -S 0.0.0.0:8000 -t public"]

  pulse-engine:
    image: python:3.12-slim
    working_dir: /app
    volumes:
      - ./pulse-engine:/app
    ports:
      - "8001:8001"
    command: ["sh", "-c", "pip install -r requirements.txt && uvicorn app.main:app --host 0.0.0.0 --port 8001"]
